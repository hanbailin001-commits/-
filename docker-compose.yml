version: '3.8'
services:
  bot:
    build: ./backend
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - db
  web:
    build: ./web
    env_file: .env
    ports:
      - "3000:3000"
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: example
      POSTGRES_DB: appdb
    volumes:
      - db-data:/var/lib/postgresql/data
volumes:
  db-data:
